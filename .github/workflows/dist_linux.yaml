name: Build on Linux
on: push

env:
  CACHE_VERSION: v1

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install build-essential scons pkg-config libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev libglu-dev libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev libfuse2

      - name: Prep dist config
        run: cp dist_config.example.json dist_config.json

      - name: Get submodule SHAs
        id: submodule-shas
        run: |
          echo "nim_sha=$(git -C vendor/nim rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "godot_sha=$(git -C vendor/godot rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "voxel_sha=$(git -C vendor/modules/voxel rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Cache Nim build
        uses: actions/cache@v3
        with:
          path: |
            vendor/nim/bin
            .build_state/nim_built
          key: ${{ runner.os }}-nim-${{ env.CACHE_VERSION }}-${{ steps.submodule-shas.outputs.nim_sha }}

      - name: Cache nimble dependencies
        uses: actions/cache@v3
        with:
          path: nimbledeps
          key: ${{ runner.os }}-nimbledeps-${{ env.CACHE_VERSION }}-${{ hashFiles('nimble.lock') }}

      - name: Cache Godot build
        uses: actions/cache@v3
        with:
          path: |
            vendor/godot/bin
            fonts
          key: ${{ runner.os }}-godot-${{ env.CACHE_VERSION }}-${{ steps.submodule-shas.outputs.godot_sha }}-${{ steps.submodule-shas.outputs.voxel_sha }}

      - name: Setup direnv
        run: |
          curl -sfL https://direnv.net/install.sh | bash
          direnv allow

      - name: Build distribution
        run: eval "$(direnv export bash)" && ./build.sh dist

      - uses: actions/upload-artifact@v4
        with:
          name: Enu Linux Distribution
          path: |
            dist/enu-*.tar.gz
            dist/enu-*.AppImage
