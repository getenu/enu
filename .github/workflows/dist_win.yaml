name: Build on Windows
on: push

env:
  CACHE_VERSION: v3

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install distribution tools
        run: choco install innosetup reshack

      - name: Prep dist config
        run: cp dist_config.example.json dist_config.json

      - name: Get submodule SHAs
        id: submodule-shas
        run: |
          echo "nim_sha=$(git -C vendor/nim rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          echo "godot_sha=$(git -C vendor/godot rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          echo "voxel_sha=$(git -C vendor/modules/voxel rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Cache Nim build
        uses: actions/cache@v3
        with:
          path: |
            vendor/nim/bin
            .build_state/nim_built
          key: ${{ runner.os }}-nim-${{ env.CACHE_VERSION }}-${{ steps.submodule-shas.outputs.nim_sha }}

      - name: Cache nimble dependencies
        uses: actions/cache@v3
        with:
          path: nimbledeps
          key: ${{ runner.os }}-nimbledeps-${{ env.CACHE_VERSION }}-${{ hashFiles('nimble.lock') }}

      - name: Cache Godot build
        id: godot-cache
        uses: actions/cache@v3
        with:
          path: |
            vendor/godot/bin
            fonts
          key: ${{ runner.os }}-godot-${{ env.CACHE_VERSION }}-${{ steps.submodule-shas.outputs.godot_sha }}-${{ steps.submodule-shas.outputs.voxel_sha }}

      - name: Cache build environment
        uses: actions/cache@v3
        with:
          path: build_env
          key: ${{ runner.os }}-buildenv-${{ env.CACHE_VERSION }}

      - name: Configure git for nimble
        run: git config --global core.autocrlf false

      - name: Clear nimbledeps if lockfile verification fails
        run: |
          if (Test-Path nimbledeps/pkgs2) {
            $pkgCount = (Get-ChildItem nimbledeps/pkgs2 | Measure-Object).Count
            Write-Host "Found $pkgCount packages in cached nimbledeps"
            if ($pkgCount -lt 30) {
              Write-Host "Package count suspiciously low, clearing cache..."
              Remove-Item -Recurse -Force nimbledeps
            }
          }

      - name: Setup PATH for all build dependencies
        run: |
          echo "${{ github.workspace }}\vendor\nim\bin" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\nimbledeps\bin" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\build_env\mingw64\bin" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\build_env\python" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\build_env\python\Scripts" >> $env:GITHUB_PATH

      - name: Build distribution
        id: build
        run: ./build.bat dist
        continue-on-error: true

      - name: Upload nimbledeps on failure
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nimbledeps-debug
          path: nimbledeps/

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: Enu Windows Distribution
          path: |
            dist/*.exe
            dist/*.zip
