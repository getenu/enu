name: Build on Windows
on: push

env:
  CACHE_VERSION: v3

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install distribution tools
        run: choco install innosetup reshack

      - name: Prep dist config
        run: cp dist_config.example.json dist_config.json

      - name: Get submodule SHAs
        id: submodule-shas
        run: |
          echo "nim_sha=$(git -C vendor/nim rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          echo "godot_sha=$(git -C vendor/godot rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          echo "voxel_sha=$(git -C vendor/modules/voxel rev-parse HEAD)" >> $env:GITHUB_OUTPUT

      - name: Cache Nim build
        uses: actions/cache@v3
        with:
          path: |
            vendor/nim/bin
            .build_state/nim_built
          key: ${{ runner.os }}-nim-${{ env.CACHE_VERSION }}-${{ steps.submodule-shas.outputs.nim_sha }}


      - name: Cache Godot build
        id: godot-cache
        uses: actions/cache@v3
        with:
          path: |
            vendor/godot/bin
            fonts
          key: ${{ runner.os }}-godot-${{ env.CACHE_VERSION }}-${{ steps.submodule-shas.outputs.godot_sha }}-${{ steps.submodule-shas.outputs.voxel_sha }}

      - name: Cache build environment
        uses: actions/cache@v3
        with:
          path: build_env
          key: ${{ runner.os }}-buildenv-${{ env.CACHE_VERSION }}

      - name: Configure git for nimble
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Dump git configuration
        run: |
          Write-Host "Git executable path:"
          (Get-Command git).Source
          Write-Host "`nGit version:"
          git --version
          Write-Host "`n=== ALL GIT CONFIGURATION (with origins) ==="
          git config --list --show-origin
          Write-Host "`n=== SYSTEM CONFIG ONLY ==="
          git config --system --list
          Write-Host "`n=== GLOBAL CONFIG ONLY ==="
          git config --global --list
          Write-Host "`n=== LOCAL CONFIG ONLY ==="
          git config --local --list

      - name: Manually clone cligen for debugging
        run: |
          New-Item -ItemType Directory -Force -Path debug_packages
          git clone https://github.com/c-blake/cligen.git debug_packages/cligen
          cd debug_packages/cligen
          git rev-parse HEAD
          git log -1 --format="%H %s"

      - name: Setup PATH for all build dependencies
        run: |
          echo "${{ github.workspace }}\vendor\nim\bin" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\nimbledeps\bin" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\build_env\mingw64\bin" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\build_env\python" >> $env:GITHUB_PATH
          echo "${{ github.workspace }}\build_env\python\Scripts" >> $env:GITHUB_PATH

      - name: Build distribution
        id: build
        run: ./build.bat dist
        continue-on-error: true

      - name: Get nimble cache location
        if: steps.build.outcome == 'failure'
        id: cache-paths
        run: |
          echo "userprofile_cache=$env:USERPROFILE\.nimble\pkgcache" >> $env:GITHUB_OUTPUT
          echo "localappdata_cache=$env:LOCALAPPDATA\nimble\pkgcache" >> $env:GITHUB_OUTPUT

      - name: Upload debug info on failure
        if: steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: nimble-debug
          path: |
            nimbledeps/
            debug_packages/
            ${{ steps.cache-paths.outputs.userprofile_cache }}
            ${{ steps.cache-paths.outputs.localappdata_cache }}

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: Enu Windows Distribution
          path: |
            dist/*.exe
            dist/*.zip
