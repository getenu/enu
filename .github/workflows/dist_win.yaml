name: Build on Windows
on: push

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Install Nim
        run: |
          cd ${HOME}
          C:\msys64\usr\bin\wget.exe https://nim-lang.org/download/nim-2.2.4_x64.zip
          7z.exe x nim-2.2.4_x64.zip -y
      - name: Install build deps
        run: choco install yasm innosetup rcedit zip reshack
      - name: Install scons
        run: python -m pip install scons
      - name: Update path
        run: echo "${HOME}/.nimble/bin;${HOME}/nim-2.2.4/bin;C:\msys64\mingw64\bin;C:\Program Files (x86)\Resource Hacker" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Configure git for nimble
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.symlinks false
      - name: Install nimble deps
        run: nimble setup -y
      - name: Save SHAs of submodules
        run: 'git submodule status > .submodules.tmp'
      - name: Prep dist config
        run: cp dist_config.example.json dist_config.json

      - name: prereq cache
        id: prereq-cache
        uses: actions/cache@v3
        with:
          path: |
            vendor/godot/bin
            fonts
          key: ${{ runner.os }}-prereq-cache-v4-${{ hashFiles('.submodules.tmp') }}
      - name: build prereqs
        run: nimble dist_prereqs
        if: steps.prereq-cache.outputs.cache-hit != 'true'
      - name: Download and copy mesa
        # github runner doesn't have a GPU, so we need to link to mesa
        # to start godot
        run: |
          md -f vendor/godot/bin
          md mesa
          cd mesa
          C:\msys64\usr\bin\wget.exe https://github.com/pal1000/mesa-dist-win/releases/download/19.2.5/mesa3d-19.2.5-release-mingw.7z
          7z.exe e mesa3d-19.2.5-release-mingw.7z -y -o"..\vendor\godot\bin" x64/opengl32.dll
          cd ..
          rm mesa -Recurse
        if: steps.prereq-cache.outputs.cache-hit != 'true'

      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3

      - name: Dist
        run: nimble dist_package

      # Checksum unsigned files
      - name: Checksum unsigned files (before signing)
        run: |
          echo "=== BEFORE SIGNING ==="
          $version = (git describe --tags HEAD).Trim()
          $distDir = "dist/enu-$version"
          echo "Unsigned enu.exe:"
          (Get-FileHash "$distDir/enu.exe" -Algorithm SHA256).Hash
          echo "Unsigned enu.dll:"
          (Get-FileHash "$distDir/enu.dll" -Algorithm SHA256).Hash

      # Upload unsigned dist for zip signing
      - name: Upload unsigned dist for zip signing
        uses: actions/upload-artifact@v4
        id: upload-unsigned-zip
        with:
          name: unsigned-dist-zip
          path: dist/*.zip

      # Sign the zip file (deep signs exe/dll inside)
      - name: Submit zip to SignPath for signing
        uses: SignPath/github-action-submit-signing-request@v1
        id: signpath-zip
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: enu-zip
          github-artifact-id: ${{ steps.upload-unsigned-zip.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-signed-zip

      # Extract signed exe/dll from the signed zip
      - name: Extract signed exe/dll and verify
        run: |
          echo "=== EXTRACTING SIGNED FILES FROM ZIP ==="
          $version = (git describe --tags HEAD).Trim()
          $signedZip = Get-ChildItem dist-signed-zip/*.zip | Select-Object -First 1
          echo "Extracting from: $signedZip"

          # Extract to temp location
          Expand-Archive -Path $signedZip -DestinationPath temp-signed -Force

          # Show checksums of signed files
          echo "=== AFTER SIGNING ==="
          echo "Signed enu.exe:"
          (Get-FileHash "temp-signed/enu-$version/enu.exe" -Algorithm SHA256).Hash
          echo "Signed enu.dll:"
          (Get-FileHash "temp-signed/enu-$version/enu.dll" -Algorithm SHA256).Hash

          # Replace unsigned files with signed ones
          echo "=== REPLACING UNSIGNED FILES WITH SIGNED VERSIONS ==="
          Copy-Item "temp-signed/enu-$version/enu.exe" "dist/enu-$version/enu.exe" -Force
          Copy-Item "temp-signed/enu-$version/enu.dll" "dist/enu-$version/enu.dll" -Force

          # Verify replacement
          echo "=== VERIFICATION: Files in dist directory ==="
          echo "Replaced enu.exe:"
          (Get-FileHash "dist/enu-$version/enu.exe" -Algorithm SHA256).Hash
          echo "Replaced enu.dll:"
          (Get-FileHash "dist/enu-$version/enu.dll" -Algorithm SHA256).Hash

      # Rebuild installer with signed files
      - name: Rebuild installer with signed files
        run: nimble build_installer

      # Upload unsigned installer for signing
      - name: Upload unsigned installer for signing
        uses: actions/upload-artifact@v4
        id: upload-unsigned-installer
        with:
          name: unsigned-installer
          path: dist/*-installer.exe

      # Sign the installer
      - name: Submit installer to SignPath for signing
        uses: SignPath/github-action-submit-signing-request@v1
        id: signpath-installer
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: enu-installer
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist-signed-installer

      # Upload final signed artifacts
      - name: Upload final signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Enu Windows Distribution (Signed)
          path: |
            dist-signed-zip/*.zip
            dist-signed-installer/*.exe
